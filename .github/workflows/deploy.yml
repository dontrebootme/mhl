# Deploy to Firebase on merge to main
name: Deploy to Firebase on merge

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'LICENSE'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Install web dependencies
        run: cd web && npm ci
      - name: Run web tests
        run: cd web && npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SPOF_IO }}
      - name: Install Firebase tools
        run: npm install -g firebase-tools@14
      - name: Copy mhl_scraper to functions
        run: |
          cp -r mhl_scraper functions/
          find functions/mhl_scraper -name "__pycache__" -type d -exec rm -r {} + 2>/dev/null || true
      - name: Setup venv for Firebase Functions
        run: |
          cd functions
          uv venv venv --seed
          source venv/bin/activate
          uv pip install -r requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Build Web App
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: |
          cd web
          npm ci
          npm audit --audit-level=high || echo "::warning::NPM vulnerabilities detected"
          npm run build
      - name: Deploy Functions, Hosting (staging), and Firestore Rules
        run: |
          set -o pipefail
          source functions/venv/bin/activate
          export PYTHONPATH=$PYTHONPATH:$(pwd)/functions
          firebase deploy --project=spof-io \
            --only functions:mhlv2_sync,hosting:staging,firestore:rules,firestore:indexes
